version: 2
project_name: dpilot
builds:
  - main: ./cmd/dpilot
    binary: dpilot
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/haraldpdl/dpilot/cmd/dpilot/cmd.Version={{.Version}}
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: checksums.txt
brews:
  - repository:
      owner: haraldpdl
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/haraldpdl/dpilot
    description: Orchestrate ordered groups of ddev projects
    license: MIT
    install: |
      bin.install "dpilot"
    test: |
      system "#{bin}/dpilot", "version"
