version: 2
project_name: dpilot
builds:
  - main: ./cmd/dpilot
    binary: dpilot
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/haraldpdl/dpilot/cmd/dpilot/cmd.Version={{.Version}}
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: checksums.txt
homebrew_casks:
  - repository:
      owner: haraldpdl
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/haraldpdl/dpilot
    description: Orchestrate ordered groups of ddev projects
    # The binary is unsigned/un-notarized, so strip the download quarantine
    # attribute on install; otherwise Gatekeeper blocks first run.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/dpilot"]
          end
